services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cnxh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cnxh_password}
      POSTGRES_DB: ${POSTGRES_DB:-cnxh_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cnxh} -d ${POSTGRES_DB:-cnxh_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://cnxh:cnxh_password@db:5432/cnxh_db}
      JWT_SECRET: ${JWT_SECRET:-doi_chuoi_bi_mat_rat_dai_truoc_khi_chay_production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Quản trị viên}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

