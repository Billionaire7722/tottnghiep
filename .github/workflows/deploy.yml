name: Deploy CNXH

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cnxh-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Typecheck backend
        run: npm run typecheck
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/cnxh_deploy_key
          chmod 600 ~/.ssh/cnxh_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/cnxh_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='${DEPLOY_PATH:-/opt/cnxh-quiz}' bash -s" <<'REMOTE_SCRIPT'
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main
            cp .env.production .env
            chmod 600 .env
            COMPOSE_PARALLEL_LIMIT=1 docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
            APP_PORT="$(grep -E '^APP_PORT=' .env | tail -1 | cut -d= -f2-)"
            curl -fsS "http://127.0.0.1:${APP_PORT:-8088}/api/health"
          REMOTE_SCRIPT
